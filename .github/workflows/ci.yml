name: ci

# Continuous testing: runs `zig build test -Doptimize=ReleaseFast` (golden + unit) on every
# push and pull request, on linux + macos. Gates PRs on green ReleaseFast tests.
#
# WHY ReleaseFast (not Debug): PRD §15 — `zig build test` in Debug hits a linker bug
# (R_X86_64_PC64) with the bundled C++ SIMD libs (simdutf/highway/utfcpp via ghostty);
# release builds are unaffected. So CI MUST pass -Doptimize=ReleaseFast. Verified locally:
# `zig build test -Doptimize=ReleaseFast` exits 0 with all 275 tests green.
#
# WHY a SEPARATE file (not a job in release.yml): release.yml fires ONLY on `v*` tags (+ an
# optional workflow_dispatch) to build+publish prebuilt binaries. Tests must run on EVERY
# commit/PR, not just releases. Different trigger ⇒ separate workflow file. (P4.M1.T1.S1's
# release.yml is explicitly build+release only; it leaves the test job to this task — S2.)

on:
  push:
  pull_request:

# Least-privilege: this job only reads the repo + fetches PUBLIC deps (ghostty/parg). It creates
# no release assets and writes nothing. The default GITHUB_TOKEN for push/PR is read-only anyway;
# this `permissions:` block makes the read-only intent explicit (good hygiene; harmless).
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # one OS failing must NOT cancel the other (maximizes signal)
      matrix:
        # ubuntu-latest = linux-x86_64 (native). macos-latest = macos-arm64 / Apple Silicon
        # (native, GA since macos-14). Tests run on the HOST arch natively — we do NOT need the
        # 4-target cross-matrix that release.yml uses; 2 native hosts cover "linux + macos".
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        # mlugg/setup-zig@v2 downloads Zig 0.15.2 to PATH AND auto-caches the global zig cache
        # (~/.cache/zig on Linux, ~/Library/Caches/zig on macOS) across runs (it also redirects
        # all local caches into the global cache). So no separate cache action is needed. Mirrors
        # release.yml's Setup Zig step exactly (version pinned to build.zig.zon's minimum_zig_version).
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run tests (ReleaseFast)
        # `zig build test` builds + runs ALL tests reachable from exe.root_module: the golden
        # harness (src/golden_test.zig: testdata/*.ansi → byte-equal *.html, 2 test fns) AND every
        # per-file unit test (cli/palette/render/capture/tui/region/main = 273 fns; 275 total).
        #
        # --fetch pre-warms the global zig cache: the test binary LINKS ghostty-vt (render.zig,
        # palette.zig, tui/view.zig all @import("ghostty-vt")), so ghostty + its ~25 transitive
        # C++ SIMD sub-deps MUST be fetched even for tests. On a fresh CI runner this is the
        # first-fetch; setup-zig's cache makes later runs warm. --fetch also fails fast on
        # dep-download errors (instead of a confusing mid-compile failure).
        #
        # ZIG_HTTP_MAX_CONNS=1 caps the package manager's concurrent HTTP connections while
        # fetching ghostty's deps from github.com — avoids rate-limiting/connection exhaustion.
        # Same env release.yml uses for its build.
        #
        # SIMD stays ON (we do NOT pass -Dsimd=false): the Debug R_X86_64_PC64 bug is Debug-only;
        # ReleaseFast links cleanly WITH SIMD enabled (verified locally). Keeping SIMD on means
        # the SIMD code paths are actually exercised by the tests (better coverage). -Dsimd=false
        # would silently skip them.
        run: |
          zig build --fetch
          zig build test -Doptimize=ReleaseFast
        env:
          ZIG_HTTP_MAX_CONNS: "1"

  # §8.1 end-to-end envelope smoke (P1.M1.T3.S1). Drives the REAL ./zig-out/bin/tmux-2html
  # through every HTML output path (render stdout/--output/--open→temp/--selection linewise+
  # block/--title/--lang/C-locale; pane --visible/--full; region confirm via python3 pty) and
  # asserts each emits a COMPLETE §8.1 document (<!DOCTYPE html> … </html>), never a bare <pre>
  # fragment, with correct escaped <title>/<html lang>/page-bg. The §8.1 "done" gate (PRD §15).
  #
  # PRD §0 SAFETY: the smoke creates its OWN uniquely-named tmux server via a PATH shim that
  # intercepts EVERY tmux call the binary makes, and tears down ONLY that named session
  # (`kill-session -t test`); it NEVER uses kill-server/killall/pkill/the runner's socket.
  # It SKIPs cleanly (exit 0) if tmux is absent, so it is safe on any runner — but we install
  # tmux here so the assertions actually run. linux only: the region pty drive + PATH shim are
  # POSIX; macOS is already covered by the `test` matrix (the Zig unit tests include the
  # title/lang/override-branch component tests). A regression here fails CI.
  envelope:
    name: §8.1 envelope smoke (isolated tmux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install tmux
        # python3 is already present on ubuntu-latest (needed only for the region pty drive;
        # the smoke SKIPs region gracefully if python3 is absent).
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast
        env:
          ZIG_HTTP_MAX_CONNS: "1"

      - name: §8.1 envelope integration smoke
        run: sh tests/envelope_smoke.sh

      - name: region empty-cell confirm regression (Issue 1)
        # python3 pre-installed on ubuntu-latest; tmux installed above. Drives the region
        # TUI via a pty and asserts a blank-cell confirm warns + exits 1 + writes nothing.
        run: sh tests/region_empty_confirm.sh

  # Plugin option threading test (P1.M1.T2.S1). A separate, dependency-free job: it sources
  # tmux-2html.tmux under a MOCKED `tmux()` shell function (never a real tmux binary/socket —
  # PRD §0-safe) and asserts the §8.1 options @tmux-2html-title/@tmux-2html-lang thread into all
  # three prefix-table bindings as --title/--lang before --target. Pure POSIX sh, no Zig, no
  # deps, runs on linux only (the loader + mock are shell; macOS dash/bash behave identically
  # and the Zig matrix already covers cross-OS). A regression here fails CI.
  plugin:
    name: plugin options (sh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Plugin option threading test (mocked tmux; no tmux required)
        run: sh tests/plugin_options.sh

  # Repo safety guard (AGENTS.md). Runs scripts/check-safety.sh — the deterministic static
  # scan that FAILs on the anti-patterns behind the 2026-07-18 runaway-audit incident:
  # recursive bare-`exec tmux` PATH shims, unbounded `>> calls.log`, and catastrophic
  # global tmux teardown (kill-server / killall tmux / pkill tmux, or bare kill-server not
  # scoped to an isolated -L socket). Enforced in CI so it gates every contributor/agent,
  # not only opt-in local pre-commit hooks. linux only: the scanner is bash + GNU coreutils
  # (readlink -f / stat -c / numfmt / find -printf).
  safety:
    name: repo safety scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run check-safety.sh
        run: |
          chmod +x scripts/check-safety.sh
          ./scripts/check-safety.sh
